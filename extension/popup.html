<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #0f0f10;
      color: #e0e0e0;
      padding: 16px;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .logo { font-size: 22px; }
    .title { font-size: 14px; font-weight: 600; color: #fff; }
    .subtitle { font-size: 11px; color: #666; margin-top: 1px; }

    .status-box {
      background: #1a1a1b; border: 1px solid #2a2a2b; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px; min-height: 44px;
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.unknown  { background: #555; }
    .status-dot.checking { background: #f5a623; animation: pulse 1s infinite; }
    .status-dot.ok       { background: #4caf50; }
    .status-dot.error    { background: #f44336; }
    .status-dot.syncing  { background: #2196f3; animation: pulse 0.8s infinite; }
    .status-dot.success  { background: #4caf50; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .status-text { font-size: 12px; color: #bbb; line-height: 1.5; flex: 1; }
    .status-text strong { color: #fff; display: block; }

    /* clientId 区域 */
    .client-id-box {
      background: #1a1a1b; border: 1px solid #2a2a2b; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px;
    }
    .client-id-label { font-size: 10px; color: #555; margin-bottom: 6px; }
    .client-id-row { display: flex; gap: 6px; align-items: center; }
    .client-id-row input {
      flex: 1; background: #111; border: none; border-radius: 4px;
      padding: 5px 8px; font-size: 11px; color: #e94d8a;
      font-family: monospace; outline: none; cursor: text;
    }
    .copy-btn {
      flex-shrink: 0; background: #2a2a2b; border: none; border-radius: 4px;
      padding: 4px 10px; font-size: 11px; color: #aaa; cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #333; color: #fff; }

    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: linear-gradient(135deg, #e94d8a, #c9336e); color: #fff; }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-primary:disabled { background: #2a2a2b; color: #555; cursor: not-allowed; }

    .info { margin-top: 10px; font-size: 10px; color: #3a3a3a; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🎵</span>
    <div>
      <div class="title">抖音 Cookie 同步</div>
      <div class="subtitle">自动同步登录状态到发布工具</div>
    </div>
  </div>

  <div class="status-box">
    <div class="status-dot unknown" id="dot"></div>
    <div class="status-text" id="statusText">
      <strong>初始化中...</strong>
    </div>
  </div>

  <!-- 专属凭证 -->
  <div class="client-id-box">
    <div class="client-id-label">你的专属凭证（配置到发布工具后永久有效）</div>
    <div class="client-id-row">
      <input type="text" id="clientId" readonly placeholder="生成中..." />
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </div>

  <button class="btn btn-primary" id="syncBtn">🔄 立即同步登录状态</button>

  <div class="info">
    插件已在后台每 30 分钟自动同步<br/>
    只需登录抖音创作者后台，无需其他操作
  </div>

  <script src="popup.js"></script>
</body>
</html>
