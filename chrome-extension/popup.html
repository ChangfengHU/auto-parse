<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vyibc-auto-parse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .title { font-size: 15px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #6b7280; margin-top: 2px; }

    .body { padding: 16px; }

    .status-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: #6b7280; }
    .status-value { color: #e5e5e5; font-weight: 500; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 99px; font-size: 11px;
    }
    .badge-green { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .badge-red { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .badge-gray { background: #1f1f1f; color: #9ca3af; border: 1px solid #374151; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-green { background: #4ade80; }
    .dot-red { background: #f87171; }
    .dot-gray { background: #9ca3af; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .tip {
      margin-top: 10px;
      font-size: 11px; color: #4b5563;
      text-align: center; line-height: 1.6;
    }
    .tip a { color: #8b5cf6; text-decoration: none; }

    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #1f2937; border: 1px solid #374151;
      color: #e5e5e5; font-size: 12px;
      padding: 6px 14px; border-radius: 99px;
      opacity: 0; transition: opacity 0.3s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">▶</div>
    <div>
      <div class="title">vyibc-auto-parse</div>
      <div class="subtitle">抖音 Cookie 同步工具</div>
    </div>
  </div>

  <div class="body">
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">抖音登录状态</span>
        <span id="loginStatus" class="badge badge-gray">
          <span class="dot dot-gray"></span> 检测中...
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">服务器 Cookie</span>
        <span id="serverStatus" class="badge badge-gray">
          <span class="dot dot-gray"></span> 未知
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">上次同步</span>
        <span id="lastSync" class="status-value">—</span>
      </div>
    </div>

    <button class="btn btn-primary" id="syncBtn">
      <span id="btnIcon">⇅</span>
      <span id="btnText">同步 Cookie 到服务器</span>
    </button>

    <div class="tip">
      请先在浏览器登录
      <a href="https://www.douyin.com" target="_blank">抖音网页版</a>
      再点击同步
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
