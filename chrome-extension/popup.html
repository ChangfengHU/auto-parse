<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vyibc-auto-parse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
    }

    .header {
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sync-icon-btn {
      background: none; border: 1px solid #2a2a2b; border-radius: 6px;
      color: #6b7280; cursor: pointer; padding: 4px 7px; font-size: 13px;
      transition: all 0.15s; flex-shrink: 0;
    }
    .sync-icon-btn:hover:not(:disabled) { border-color: #7c3aed; color: #a78bfa; }
    .sync-icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .title { font-size: 14px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #6b7280; margin-top: 1px; }

    .body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Cookie 文本框区域 ── */
    .cookie-section {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px;
    }
    .section-label {
      font-size: 11px; color: #6b7280;
      margin-bottom: 8px; font-weight: 500;
    }
    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      color: #d1d5db;
      font-size: 11px;
      font-family: 'SF Mono', Menlo, monospace;
      line-height: 1.5;
      padding: 8px 10px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #8b5cf6; }
    textarea::placeholder { color: #4b5563; }

    /* 读取 + 复制 两个按钮一行 */
    .cookie-btns {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    .read-btn {
      flex: 1;
      padding: 7px;
      background: #1f1f2e;
      border: 1px solid #3730a3;
      border-radius: 6px;
      color: #a5b4fc;
      font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .read-btn:hover { background: #2e2b4a; border-color: #6366f1; }
    .read-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .copy-btn {
      padding: 7px 12px;
      background: #1a1f1a;
      border: 1px solid #2d4a2d;
      border-radius: 6px;
      color: #86efac;
      font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #1f2e1f; border-color: #4ade80; }

    /* ── 操作按钮区域 ── */
    .action-section { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      width: 100%; padding: 10px;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-douyin {
      background: #111827;
      border: 1px solid #374151;
      color: #e5e7eb;
    }
    .btn-douyin:hover { background: #1f2937; border-color: #4b5563; }
    .btn-douyin:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── 保活开关行 ── */
    .keepalive-row {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .keepalive-left { display: flex; flex-direction: column; gap: 2px; }
    .keepalive-label { font-size: 12px; font-weight: 500; color: #d1d5db; }
    .keepalive-desc { font-size: 10px; color: #6b7280; }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #374151; border-radius: 20px;
      transition: 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #8b5cf6; }
    .toggle input:checked + .slider:before { transform: translateX(16px); }

    /* ── 状态卡片 ── */
    .status-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      padding: 4px 0;
    }
    .status-row + .status-row { border-top: 1px solid #222; }
    .status-label { color: #6b7280; }
    .status-value { color: #e5e5e5; font-weight: 500; }
    .text-green { color: #4ade80 !important; }
    .text-gray  { color: #6b7280 !important; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 99px; font-size: 10px;
    }
    .badge-green  { background: #052e16;  color: #4ade80; border: 1px solid #166534; }
    .badge-yellow { background: #2d2000;  color: #fbbf24; border: 1px solid #7c5f00; }
    .badge-red    { background: #2d0a0a;  color: #f87171; border: 1px solid #7f1d1d; }
    .badge-gray   { background: #1f1f1f;  color: #9ca3af; border: 1px solid #374151; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-green  { background: #4ade80; }
    .dot-yellow { background: #fbbf24; }
    .dot-red    { background: #f87171; }
    .dot-gray   { background: #9ca3af; }

    /* ── Toast ── */
    .btn-publish {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: #fff;
    }
    .btn-publish:hover:not(:disabled) { filter: brightness(1.1); }
    .toast {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: #1f2937; border: 1px solid #374151;
      color: #e5e5e5; font-size: 12px;
      padding: 6px 14px; border-radius: 99px;
      opacity: 0; transition: opacity 0.25s;
      white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Platform Tabs ── */
    .platform-tabs {
      display: flex;
      gap: 0;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #6b7280;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: #e5e5e5; }
    .tab-btn.active {
      color: #a78bfa;
      border-bottom-color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">▶</div>
    <div>
      <div class="title">vyibc-auto-parse</div>
      <div class="subtitle" id="platformSubtitle">抖音 Cookie 管理</div>
    </div>
    <div class="header-actions">
      <button class="sync-icon-btn" id="serverConfigBtn" title="配置解析服务器地址">⚙</button>
      <button class="sync-icon-btn" id="manualSyncBtn" title="立即远程同步（解析平台 + 凭证库）">☁</button>
    </div>
  </div>

  <!-- Platform Tabs -->
  <div class="platform-tabs">
    <button class="tab-btn active" id="tabDouyin" data-platform="douyin">抖音</button>
    <button class="tab-btn" id="tabXhs" data-platform="xhs">小红书</button>
    <button class="tab-btn" id="tabGemini" data-platform="gemini">Gemini</button>
  </div>

  <div class="body">

    <!-- Cookie 信息文本框 -->
    <div class="cookie-section">
      <div class="section-label">抖音登录信息（Cookie）</div>
      <textarea
        id="cookieBox"
        rows="4"
        placeholder="点击「一键读取」自动填入，或手动粘贴 Cookie 字符串..."
      ></textarea>
      <div class="cookie-btns">
        <button class="read-btn" id="readBtn">
          <span id="readIcon">📋</span>
          <span id="readText">一键读取抖音登录信息</span>
        </button>
        <button class="copy-btn" id="copyBtn">复制</button>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-section">
      <!-- 调试按钮：显示读取到的 cookies -->
      <button class="btn btn-douyin" id="debugBtn" style="font-size:11px;padding:6px;">
        🐛 调试：查看读取到的 Cookie
      </button>
    </div>

    <!-- 保活开关 -->
    <div class="keepalive-row">
      <div class="keepalive-left">
        <div class="keepalive-label">自动保活</div>
        <div class="keepalive-desc">每分钟 ping 抖音接口，防止 Session 过期 &nbsp;·&nbsp; <span id="keepAliveStatus" class="text-gray">已关闭</span></div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="keepAliveToggle">
        <span class="slider"></span>
      </label>
    </div>

    <!-- 状态 -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">抖音登录状态</span>
        <span id="loginStatus" class="badge badge-gray">
          <span class="dot dot-gray"></span> 检测中...
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">解析平台 Cookie</span>
        <span id="serverStatus" class="badge badge-gray">
          <span class="dot dot-gray"></span> 未知
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">上次远程同步</span>
        <span id="lastPublishSync" class="status-value">—</span>
      </div>
      <div class="status-row" style="margin-top:8px;padding-top:8px;border-top:1px solid #2a2a2b;">
        <span class="status-label">远程凭证 ID</span>
        <span id="clientIdDisplay" class="status-value" style="font-family:monospace;font-size:10px;color:#e94d8a;cursor:pointer;" title="点击复制">—</span>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
